[meta]
license      = "GPL-2.0-only"
homepage     = "https://github.com/peios/pkm"
build_script = "build.sh"

[[package]]
name         = "kernel"
architecture = "x86_64"
description  = "Peios kernel (Linux base + PKM LSM)"
files = [
  "boot/vmlinuz",
]

[upstream]
git            = "https://github.com/peios/pkm.git"
# Accept stable (v1.2.3) and pre-release (v1.2.3-alpha1 / -beta1 / -rc1) tags.
# Capture group becomes the upstream component of the package version:
#   tag v0.20.0-alpha1 -> package version 0.20.0-alpha1-<peios_revision>
tag_pattern    = "^v([0-9]+\\.[0-9]+\\.[0-9]+(?:-[a-z]+[0-9]+)?)$"
peios_revision = 1

[watch]
poll_interval = "1h"
