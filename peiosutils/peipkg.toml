[meta]
license      = "MIT"
homepage     = "https://github.com/peios/peiosutils"
build_script = "build.sh"

[[package]]
name         = "peiosutils"
architecture = "x86_64"
description  = "Peios core userspace utilities — the peiosified (KACS-aware) subset of the uutils coreutils port, one static-musl binary per command"
# The curated peiosified set (the pu_* crates). build.sh installs exactly
# these 16 binaries to usr/bin/<name>; the rest of the uutils workspace is
# unported and not shipped.
files = [
  "usr/bin/**",
]

[upstream]
git            = "https://github.com/peios/peiosutils.git"
# Same stable/pre-release grammar as the other recipes:
#   tag v0.1.0 -> package version 0.1.0-<peios_revision>
tag_pattern    = "^v([0-9]+\\.[0-9]+\\.[0-9]+(?:-[a-z]+[0-9]+)?)$"
peios_revision = 1

# No [[sign]]: these are ordinary userspace utilities, not TCB components.
# KACS gates their file operations against the calling user's token; they
# hold no privilege of their own and need no PIP trust.

[watch]
poll_interval = "1h"
