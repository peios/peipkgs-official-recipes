[meta]
license = "GPL-3.0-or-later"
homepage = "https://www.gnu.org/software/hello/"
build_script = "build.sh"

[[package]]
name = "hello"
architecture = "x86_64"
description = "Friendly GNU Hello which prints a greeting"
files = [
  "usr/bin/hello",
  "usr/share/info/hello.info*",
  "usr/share/locale/**/hello.mo",
  "usr/share/man/man1/hello.1*",
]

[upstream]
git = "https://git.savannah.gnu.org/git/hello.git"
tag_pattern = "^v([0-9]+\\.[0-9]+(?:\\.[0-9]+)*)$"
peios_revision = 1
submodules = true
# Older releases use earlier autotools macros and gnulib eras whose
# bootstrap conventions don't match the build script; floor at 2.12
# (the current major).
min_version = "2.12"

[watch]
poll_interval = "1h"
