[meta]
license = "BSD-3-Clause"
homepage = "http://www.figlet.org/"
build_script = "build.sh"

[[package]]
name = "figlet"
architecture = "x86_64"
description = "Program for making large letters out of ordinary text"
files = [
  "usr/bin/figlet",
  "usr/bin/chkfont",
  "usr/bin/figlist",
  "usr/bin/showfigfonts",
  "usr/share/figlet/**",
  "usr/share/man/man6/figlet.6",
  "usr/share/man/man6/showfigfonts.6",
]

[upstream]
git = "https://github.com/cmatsuoka/figlet.git"
tag_pattern = "^([0-9]+\\.[0-9]+\\.[0-9]+)$"
peios_revision = 1

[watch]
poll_interval = "1h"
