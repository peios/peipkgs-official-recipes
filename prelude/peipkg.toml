[meta]
license      = "MIT"
homepage     = "https://github.com/peios/prelude"
build_script = "build.sh"

[[package]]
name         = "prelude"
architecture = "x86_64"
description  = "Peios initramfs runtime: prelude PID 1 and seed-sd KACS SD seeding helper"
files = [
  "boot/initramfs/init",
  "usr/bin/seed-sd",
]

[upstream]
git            = "https://github.com/peios/prelude.git"
# Same stable/pre-release grammar as the other Peios recipes:
#   tag v0.0.1      -> package version 0.0.1-<peios_revision>
#   tag v0.0.1-rc1  -> package version 0.0.1-rc1-<peios_revision>
tag_pattern    = "^v([0-9]+\\.[0-9]+\\.[0-9]+(?:-[a-z]+[0-9]+)?)$"
peios_revision = 4

# prelude is initramfs PID 1. seed-sd calls kacs_set_sd to seed MISSING
# objects during early boot/install flows. Both are Peios TCB binaries and
# need PIP trust.
[[sign]]
path = "boot/initramfs/init"
key  = "tcb"

[[sign]]
path = "usr/bin/seed-sd"
key  = "tcb"

[watch]
poll_interval = "1h"
